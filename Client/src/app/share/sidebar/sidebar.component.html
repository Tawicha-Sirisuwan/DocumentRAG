@if (!isAuthPage()) {
  <aside 
      class="h-full bg-slate-900/80 backdrop-blur-2xl text-slate-300 flex flex-col transition-all duration-300 relative z-20 border-r border-slate-700/50 shadow-xl shadow-black/20"
      [ngClass]="isCollapsed() ? 'w-[72px]' : 'w-[280px]'">
    
    <!-- Top Area (Menu Toggle) -->
    <div class="p-3 flex items-center justify-between">
      <button 
        (click)="toggleSidebar()" 
        class="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center transition-colors outline-none shrink-0 border border-transparent hover:border-slate-700">
        <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>

      <!-- Search icon -->
      @if (!isCollapsed()) {
        <button class="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center text-slate-400 hover:text-slate-200 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </button>
      }
    </div>

    <!-- Main action buttons -->
    <div class="px-3 pt-6 pb-2 flex flex-col gap-2">
      <!-- New Chat Button - Make it stand out with glow/glassmorphism -->
      <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-full bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-300 transition-all text-sm font-medium border border-indigo-500/30 shadow-lg shadow-indigo-500/10 group cursor-pointer hover:border-indigo-400/50">
        <div class="p-1 bg-indigo-500/20 rounded-full group-hover:bg-indigo-400/30 transition-colors">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </div>
        @if (!isCollapsed()) {
          <span class="truncate">เริ่มแชทใหม่</span>
        }
      </button>

      <!-- My Data Button -->
      <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-full hover:bg-white/5 transition-colors text-sm font-medium text-slate-300 hover:text-white cursor-pointer mt-2">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
        @if (!isCollapsed()) {
          <span class="truncate">ทรัพยากรของฉัน</span>
        }
      </button>
    </div>

    <!-- Group items (Notebook/Gem) -->
    @if (!isCollapsed()) {
       <div class="px-2 pt-4 pb-2 border-b border-slate-700/50 mx-2 mb-2">
         <div class="px-3 py-2 flex items-center justify-between text-xs font-semibold text-slate-400 group cursor-pointer hover:text-slate-200 transition-colors">
            <span>โฟลเดอร์เอกสาร</span>
            <svg class="w-3.5 h-3.5 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
         </div>
         <button class="w-full flex items-center gap-3 px-4 py-2 mt-1 hover:bg-white/5 hover:text-white rounded-full transition-colors text-sm text-slate-300">
           <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"></path></svg>
           <span class="truncate">สร้างตู้เอกสารใหม่</span>
         </button>
       </div>
    }

    <!-- Chat History List -->
    <div class="flex-1 overflow-y-auto px-2 custom-scrollbar">
       @if (!isCollapsed()) {
         <div class="px-3 pt-4 pb-2 text-xs font-semibold text-slate-400 tracking-wide uppercase">ประวัติการค้นหา</div>
         
         <div class="px-3 py-2 flex items-center justify-between text-xs font-semibold text-slate-300 hover:bg-white/5 hover:text-white rounded-full cursor-pointer transition-colors group">
           <span class="truncate group-hover:text-white">เส้นทางสู่ Software AI Engineer</span>
           <svg class="w-3.5 h-3.5 flex-shrink-0 text-slate-500 group-hover:text-yellow-500 transition-colors" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11V5.5C16 3.57 14.43 2 12.5 2S9 3.57 9 5.5V11H7v2h2v5h2v-5h2v-2h-2zm-5-5.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5V11h-3V5.5zM12 22c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3z"/></svg>
         </div>

         <!-- Loop History -->
         <div class="mt-2 flex flex-col gap-1 pb-4">
           @for (chat of recentChats(); track chat.id) {
             <button 
                class="w-full text-left flex items-center px-4 py-2.5 rounded-full transition-all duration-300 text-sm font-medium border"
                [ngClass]="chat.active ? 'bg-indigo-500/20 border-indigo-500/30 text-indigo-300 shadow-[0_0_15px_rgba(99,102,241,0.15)] shadow-indigo-500/10' : 'bg-transparent border-transparent hover:bg-white/5 text-slate-300 hover:text-white'">
                <span class="truncate block w-full">{{ chat.title }}</span>
             </button>
           }
         </div>
       }
    </div>

    <!-- Bottom Settings Help Area -->
    <div class="p-3 mt-auto mb-2 border-t border-slate-700/50">
      <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-full hover:bg-white/5 transition-colors text-sm font-medium text-slate-300 hover:text-white cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        @if (!isCollapsed()) {
          <span class="truncate">ศูนย์ช่วยเหลือและตั้งค่า</span>
        }
      </button>
    </div>

  </aside>
}
