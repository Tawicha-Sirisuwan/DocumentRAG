@if (!isAuthPage()) {
  <aside 
      class="h-full bg-slate-900/80 backdrop-blur-2xl text-slate-300 flex flex-col transition-all duration-300 relative z-20 border-r border-slate-700/50 shadow-xl shadow-black/20"
      [ngClass]="isCollapsed() ? 'w-[72px]' : 'w-[280px]'">
    
    <!-- Top Area (Menu Toggle) -->
    <div class="p-3 flex items-center justify-between">
      <button 
        (click)="toggleSidebar()" 
        class="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center transition-colors outline-none shrink-0 border border-transparent hover:border-slate-700">
        <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>

      <!-- Search icon -->
      @if (!isCollapsed()) {
        <button class="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center text-slate-400 hover:text-slate-200 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </button>
      }
    </div>

    <!-- Main action buttons -->
    <div class="px-3 pt-6 pb-2 flex flex-col gap-2">
      <!-- New Chat Button - Make it stand out with glow/glassmorphism -->
      <button (click)="createNewChat()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-full bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-300 transition-all text-sm font-medium border border-indigo-500/30 shadow-lg shadow-indigo-500/10 group cursor-pointer hover:border-indigo-400/50">
        <div class="p-1 bg-indigo-500/20 rounded-full group-hover:bg-indigo-400/30 transition-colors">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </div>
        @if (!isCollapsed()) {
          <span class="truncate">เริ่มแชทใหม่</span>
        }
      </button>

    </div>

    <!-- Group items (Notebook/Gem) -->
    @if (!isCollapsed()) {
       <div class="px-2 pt-4 pb-2 border-b border-slate-700/50 mx-2 mb-2">
         <div class="px-3 py-2 flex items-center justify-between text-xs font-semibold text-slate-400 group cursor-pointer hover:text-slate-200 transition-colors">
            <span>โฟลเดอร์เอกสาร</span>
            <svg class="w-3.5 h-3.5 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
         </div>
         <button class="w-full flex items-center gap-3 px-4 py-2 mt-1 hover:bg-white/5 hover:text-white rounded-full transition-colors text-sm text-slate-300">
           <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"></path></svg>
           <span class="truncate">สร้างตู้เอกสารใหม่</span>
         </button>
       </div>
    }

    <!-- Chat History List -->
    <div class="flex-1 overflow-y-auto px-2 custom-scrollbar">
       @if (!isCollapsed()) {
         <div class="px-3 pt-4 pb-2 text-xs font-semibold text-slate-400 tracking-wide uppercase">ประวัติการค้นหา</div>

         <!-- Loop History -->
         <div class="mt-2 flex flex-col gap-1 pb-4">
           @for (chat of recentChats(); track chat.id) {
             <div 
                (click)="selectChat(chat.id)"
                class="w-full text-left flex items-center justify-between px-4 py-2.5 rounded-full transition-all duration-300 text-sm font-medium border group relative cursor-pointer"
                [ngClass]="chat.active ? 'bg-indigo-500/20 border-indigo-500/30 text-indigo-300 shadow-[0_0_15px_rgba(99,102,241,0.15)] shadow-indigo-500/10' : 'bg-transparent border-transparent hover:bg-white/5 text-slate-300 hover:text-white'">
                <div class="flex items-center flex-1 pr-2 w-0 overflow-hidden gap-1.5">
                  @if (editingChatId() === chat.id) {
                     <input 
                       #renameInput
                       type="text" 
                       [value]="chat.title"
                       class="w-full bg-[#1e293b] border border-indigo-500/50 rounded px-2 py-0.5 text-sm text-white focus:outline-none focus:border-indigo-400"
                       (click)="$event.stopPropagation()"
                       (blur)="saveRename(chat.id, renameInput.value)"
                       (keydown.enter)="saveRename(chat.id, renameInput.value)"
                       (keydown.escape)="cancelRename()"
                       autofocus>
                  } @else {
                     <span class="truncate block">{{ chat.title }}</span>
                  }
                </div>
                
                <div class="flex items-center gap-1 flex-shrink-0">
                  @if (chat.pinned) {
                     <svg class="w-3.5 h-3.5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 17v5"></path>
                        <path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"></path>
                     </svg>
                  }

                  <!-- 3 Dots Menu -->
                <div class="relative flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity " [ngClass]="{'opacity-100': openMenuId() === chat.id}">
                  <button class="p-1 rounded-full hover:bg-slate-700/50 text-slate-400 hover:text-white cursor-pointer" (click)="toggleMenu($event, chat.id)">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path></svg>
                  </button>

                  <!-- Dropdown Menu -->
                  @if (openMenuId() === chat.id) {
                    <div class="absolute right-0 top-full mt-1 w-36 bg-slate-800 rounded-xl border border-slate-700 shadow-2xl z-50 overflow-hidden py-1 cur" (click)="$event.stopPropagation()">
                      <button class="w-full text-left px-4 py-2 text-sm text-slate-300 hover:bg-slate-700 hover:text-white flex items-center gap-2 transition-colors cursor-pointer" (click)="pinChat(chat.id); $event.stopPropagation()">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                           <path d="M12 17v5"></path>
                           <path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"></path>
                        </svg>
                        {{ chat.pinned ? 'เลิกปักหมุด' : 'ปักหมุด' }}
                      </button>
                      <button class="w-full text-left px-4 py-2 text-sm text-slate-300 hover:bg-slate-700 hover:text-white flex items-center gap-2 transition-colors cursor-pointer" (click)="startRename(chat.id); $event.stopPropagation()">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        เปลี่ยนชื่อ
                      </button>
                      <button class="w-full text-left px-4 py-2 text-sm text-red-400 hover:bg-red-500/20 hover:text-red-300 flex items-center gap-2 transition-colors cursor-pointer" (click)="deleteChat(chat.id); $event.stopPropagation()">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        ลบ
                      </button>
                    </div>
                  }
                </div>
              </div>
            </div>
           }
         </div>
       }
    </div>

    <!-- Bottom Settings Help Area -->
    <div class="p-3 mt-auto mb-2 border-t border-slate-700/50">
      <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-full hover:bg-white/5 transition-colors text-sm font-medium text-slate-300 hover:text-white cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        @if (!isCollapsed()) {
          <span class="truncate">ศูนย์ช่วยเหลือและตั้งค่า</span>
        }
      </button>
    </div>

  </aside>
}
