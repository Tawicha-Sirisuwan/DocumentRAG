<main class="h-[calc(100vh-5rem)] bg-slate-900 text-white font-sans flex flex-col relative overflow-hidden pt-4 pb-2"
      (drop)="onDrop($event)"
      (dragover)="onDragOver($event)">
  
  <!-- พื้นหลังวงกลมแบบ Dynamic (Premium Aesthetics) -->
  <div class="absolute top-[-10%] left-[-10%] w-[32rem] h-[32rem] bg-purple-600 rounded-full mix-blend-multiply filter blur-[120px] opacity-20 pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40rem] h-[40rem] bg-indigo-600 rounded-full mix-blend-multiply filter blur-[120px] opacity-20 pointer-events-none"></div>

  <!-- Chat History Area -->
  <section #chatContainer class="flex-1 w-full max-w-5xl mx-auto overflow-y-auto px-4 sm:px-6 relative z-10 flex flex-col gap-6 py-4 custom-scrollbar scroll-smooth">
    
    @for (msg of messages(); track msg.id) {
      <div class="flex items-start gap-4 animate-fade-in-up" [ngClass]="{'flex-row-reverse': msg.sender === 'user'}">
        
        <!-- Avatar -->
        <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 shadow-lg"
             [ngClass]="msg.sender === 'user' ? 'bg-indigo-500/20 border border-indigo-500/50' : 'bg-gradient-to-br from-purple-500 to-cyan-500 p-[2px]'">
          @if (msg.sender === 'user') {
            <svg class="w-6 h-6 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          } @else {
            <div class="w-full h-full bg-slate-900 rounded-full flex items-center justify-center">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
              </svg>
            </div>
          }
        </div>

        <!-- Message Bubble -->
        <div class="max-w-[85%] md:max-w-[75%] rounded-2xl p-4 shadow-xl text-sm md:text-base tracking-wide flex flex-col gap-3 relative overflow-hidden backdrop-blur-xl"
             [ngClass]="msg.sender === 'user' ? 'bg-indigo-600/90 border border-indigo-500/50 text-white rounded-tr-sm' : 'bg-white/5 border border-white/10 text-slate-200 rounded-tl-sm'">
             
           @if (msg.isTyping) {
              <!-- Typing Indicator -->
              <div class="flex space-x-2 items-center h-5 px-1">
                <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce"></div>
                <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
              </div>
           } @else {
              <!-- File Attachment Bubble -->
              @if (msg.file) {
                 <div class="flex items-center gap-3 p-3 bg-black/20 rounded-xl border border-white/10">
                    <div class="p-2 bg-purple-500/20 rounded-lg shrink-0">
                      <svg class="w-6 h-6 text-purple-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                      </svg>
                    </div>
                    <div class="flex flex-col overflow-hidden">
                      <span class="font-medium truncate text-white max-w-[150px] sm:max-w-[300px]">{{ msg.file.name }}</span>
                      <span class="text-xs text-slate-300">{{ formatBytes(msg.file.size) }}</span>
                    </div>
                 </div>
              }

              <!-- Text Content -->
              @if (msg.content) {
                 <div class="whitespace-pre-wrap font-light leading-relaxed">{{ msg.content }}</div>
              }
           }
        </div>
      </div>
    }
  </section>

  <!-- Input Area Bar (Sticky to bottom) -->
  <section class="w-full max-w-5xl mx-auto px-4 md:px-6 relative z-10 shrink-0 mb-4 mt-2">
    <div class="w-full bg-slate-800/80 backdrop-blur-2xl border border-slate-700/50 rounded-3xl p-2 flex flex-col shadow-2xl shadow-black/50 transition-all focus-within:border-indigo-500/50 focus-within:shadow-indigo-500/20">
      
      <!-- Selected File Preview Anchor -->
      @if (selectedFile()) {
        <div class="flex items-center justify-between px-3 py-2 bg-slate-900/80 rounded-xl mx-2 mt-1 mb-2 border border-slate-700 shadow-inner animate-fade-in-up">
           <div class="flex items-center gap-3 overflow-hidden">
              <div class="bg-indigo-500/20 p-1.5 rounded-lg shrink-0">
                 <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
              </div>
              <span class="text-sm font-medium text-slate-200 truncate pr-2 max-w-[150px] sm:max-w-[300px]">{{ selectedFile()?.name }}</span>
           </div>
           <button (click)="removeSelectedFile()" class="p-1.5 bg-slate-800 hover:bg-red-500/20 rounded-full text-slate-400 hover:text-red-400 transition-colors shrink-0 outline-none">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
           </button>
        </div>
      }

      <div class="flex items-end gap-2 px-1 pb-1 pt-1">
        <!-- Attach File Button -->
        <input #fileInputForm type="file" class="hidden" accept=".pdf,.docx,.txt" (change)="onFileSelected($event)">
        <p-button (onClick)="triggerFileInput()" styleClass="p-2 sm:p-3 bg-transparent border border-transparent rounded-2xl text-slate-400 hover:text-white hover:bg-white/10 focus:outline-none transition-all outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" title="แนบไฟล์เอกสาร">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path>
          </svg>
        </p-button>

        <!-- Input TextBox -->
        <textarea 
          [ngModel]="inputText()" 
          (ngModelChange)="inputText.set($event)"
          (keydown.enter)="handleEnterKey($event)"
          rows="1"
          placeholder="พิมพ์ข้อความเพื่อสนทนากับ AI หรือแนบเอกสาร (Shift+Enter เพื่อขึ้นบรรทัดใหม่)" 
          class="flex-1 max-h-32 min-h-[44px] bg-transparent text-white border-0 focus:ring-0 resize-none py-2 sm:py-3 px-2 text-sm sm:text-base font-light placeholder-slate-500 outline-none custom-scrollbar leading-relaxed self-center">
        </textarea>

        <!-- Send Button -->
        <p-button 
            [disabled]="(!inputText().trim() && !selectedFile()) || isTyping()"
            (onClick)="sendMessage()" 
            styleClass="p-2 sm:p-3.5 mr-1 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl text-white transition-all shadow-lg hover:shadow-indigo-500/25 disabled:opacity-50 disabled:cursor-not-allowed outline-none hover:scale-[1.03] active:scale-95">
          <svg class="w-5 h-5 translate-x-[1px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
          </svg>
        </p-button>
      </div>
    </div>
  </section>
</main>
